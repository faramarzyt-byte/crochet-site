{% extends 'base.html' %}
{% block title %}{{ post.title }} | Saba Crochet{% endblock %}

{% block content %}
<article class="container" style="max-width: 800px; padding: 60px 20px;">
    <!-- Meta -->
    <p style="color: #c97a55; text-transform: uppercase; font-size: 0.9rem; font-weight: 700;">
        {{ post.created_at|date:"M d, Y" }}
    </p>

    <!-- Title -->
    <h1 style="font-family: 'Playfair Display', serif; font-size: 3rem; color: #4e3422; margin: 20px 0;">
        {{ post.title }}
    </h1>

    <!-- Image -->
    {% if post.image %}
    <img src="{{ post.image.url }}" alt="{{ post.title }}" 
         style="width: 100%; border-radius: 20px; margin-bottom: 40px;">
    {% endif %}

    <!-- Content -->
    <div style="line-height: 1.9; color: #6D6A75; font-size: 1.15rem;">
        {{ post.content|linebreaks }}
    </div>

    <hr style="margin: 60px 0; border: 0; border-top: 1px solid #eadfd7;">
    <a href="{% url 'blog' %}" class="btn btn-outline">← Back to Journal</a>
</article>
{% endblock %}
